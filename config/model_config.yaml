# ARGO_XAU_AI Model Configuration
# AI Model Parameters and Hyperparameters

# BiLSTM Model Configuration
bilstm:
  input_size: 50  # Number of features
  hidden_size: 128
  num_layers: 3
  dropout: 0.2
  bidirectional: true
  learning_rate: 0.001
  batch_size: 64
  epochs: 100
  early_stopping_patience: 10
  optimizer: "adam"
  loss_function: "mse"
  weight_decay: 0.0001

# GRU Model Configuration
gru:
  input_size: 50
  hidden_size: 256
  num_layers: 4
  dropout: 0.3
  learning_rate: 0.0005
  batch_size: 128
  epochs: 150
  early_stopping_patience: 15
  optimizer: "adam"
  loss_function: "huber"
  weight_decay: 0.0005

# Transformer Model Configuration
transformer:
  input_size: 50
  d_model: 512
  nhead: 8
  num_layers: 6
  dim_feedforward: 2048
  dropout: 0.1
  max_seq_length: 100
  learning_rate: 0.0001
  batch_size: 32
  epochs: 200
  early_stopping_patience: 20
  optimizer: "adamw"
  loss_function: "mse"
  weight_decay: 0.01
  warmup_steps: 4000

# Liquid Neural Network Configuration
lnn:
  input_size: 50
  hidden_size: 256
  num_layers: 3
  liquid_time_constant: 0.1
  learning_rate: 0.001
  batch_size: 64
  epochs: 100
  early_stopping_patience: 10
  optimizer: "adam"
  loss_function: "mse"
  weight_decay: 0.0001

# Logical Tensor Network Configuration
ltn:
  input_size: 50
  hidden_size: 128
  num_layers: 2
  logical_depth: 3
  learning_rate: 0.0005
  batch_size: 32
  epochs: 80
  early_stopping_patience: 8
  optimizer: "adam"
  loss_function: "mse"
  weight_decay: 0.0005

# Random Forest Model Configuration
random_forest:
  input_size: 50
  n_estimators: 150
  max_depth: 15
  min_samples_split: 5
  min_samples_leaf: 2
  max_features: "sqrt"
  random_state: 42
  n_jobs: -1
  learning_rate: 0.001
  batch_size: 64
  epochs: 100
  early_stopping_patience: 10
  optimizer: "adam"
  loss_function: "mse"
  weight_decay: 0.0001

# Ensemble Configuration
ensemble:
  method: "weighted_average"  # weighted_average, voting, stacking
  dynamic_weighting: true
  weight_update_frequency: "1h"  # 1h, 1d, 1w
  min_model_weight: 0.05
  max_model_weight: 0.4
  performance_lookback: 100  # trades to consider for weighting
  confidence_threshold: 0.70

# Training Configuration
training:
  validation_split: 0.2
  test_split: 0.2
  sequence_length: 100
  prediction_horizon: 5
  feature_scaling: "standard"  # standard, minmax, robust
  data_augmentation: true
  cross_validation_folds: 5
  random_seed: 42
  
# Feature Engineering
features:
  technical_indicators:
    - "sma_20"
    - "sma_50"
    - "ema_12"
    - "ema_26"
    - "rsi_14"
    - "macd"
    - "bollinger_bands"
    - "atr_14"
    - "supertrend"
    - "stochastic"
  
  market_structure:
    - "support_resistance"
    - "fibonacci_levels"
    - "pivot_points"
    - "order_blocks"
    - "fair_value_gaps"
    
  time_features:
    - "hour_of_day"
    - "day_of_week"
    - "month"
    - "session_indicator"
    - "holiday_indicator"
    
  volatility_features:
    - "realized_volatility"
    - "garch_volatility"
    - "volatility_regime"
    - "volatility_clusters"
